    <style>
        :root {

        body, html {

        /* --- Effet CRT et Scanlines --- */
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 50;
            background-size: 100% 4px;
            pointer-events: none;
        }

        .crt::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: rgba(0, 255, 0, 0.03);
            opacity: 0;
            z-index: 50;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.02; }

            100% { opacity: 0.02; }
        }

        /* --- Conteneur Principal --- */

            flex-direction: column;
            overflow-y: auto;
            position: relative;
            z-index: 10;

        /* --- Typographie et Messages --- */
        p {

    <div id="terminal-container">
        <div id="output"></div>
        
        <form id="interactive-area" onsubmit="verifierReponse(event)">
            <p id="riddle-text"></p>
            <div class="input-group">
                <span class="prompt-symbol">root@mainframe:~#</span>
                <input type="text" id="answer-input" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="TAPER ICI...">

    <script>
        // --- Configuration des textes ---
        const introText = "CONNEXION AU MAINFRAME DES VEILLEURS...\nTOUR DE BEL-AIR. IDENTIFICATION REQUISE.\nRÉPONDEZ À L'ÉNIGME POUR OBTENIR LA CLÉ D'ACCÈS.";
        const riddleText = "Je suis l'année où cette tour de béton a touché le ciel pour la première fois. Qui suis-je ?";
        const correctAnswer = "1591"; // La logique de validation traitera tout en minuscules/sans espaces
        
        // --- Éléments du DOM ---
        const outputDiv = document.getElementById('output');
        const interactiveArea = document.getElementById('interactive-area');
        const riddleP = document.getElementById('riddle-text');
        const answerInput = document.getElementById('answer-input');
        const feedbackMsg = document.getElementById('feedback-msg');
        const terminalContainer = document.getElementById('terminal-container');

        // --- Mécanique d'écriture (Machine à écrire) ---
        async function typeWriter(text, element, speed = 40) {
            element.classList.add('typing-cursor');
            for (let i = 0; i < text.length; i++) {
                element.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
                terminalContainer.scrollTop = terminalContainer.scrollHeight;
                await new Promise(resolve => setTimeout(resolve, speed));
            }
            element.classList.remove('typing-cursor');
        }

        // --- Séquence de démarrage ---
        async function initSequence() {
            const introP = document.createElement('p');
            outputDiv.appendChild(introP);
            await typeWriter(introText, introP, 50);
            
            // Petite pause avant d'afficher l'énigme
            await new Promise(resolve => setTimeout(resolve, 800));
            
            interactiveArea.style.display = 'flex';
            await typeWriter(riddleText, riddleP, 40);
            
            // Focus automatique sur l'input une fois le texte terminé
            answerInput.focus();
        }

        // --- Validation de la réponse ---
        function verifierReponse(e) {
            e.preventDefault(); // Empêche le rechargement de la page
            
            // Nettoyage de l'input : insensible à la casse et suppression des espaces inutiles
            const userAnswer = answerInput.value.trim().toLowerCase();
            
            if (userAnswer === correctAnswer) {
                declencherVictoire();
            } else {
                afficherErreur();
            }
        }

        function afficherErreur() {
            feedbackMsg.className = 'error';
            feedbackMsg.innerHTML = 'ACCÈS REFUSÉ. IDENTIFIANT INCORRECT.';
            answerInput.value = ''; // On vide le champ
            answerInput.focus();
            
            // Efface le message d'erreur après 2.5 secondes
            setTimeout(() => {
                feedbackMsg.innerHTML = '';
            }, 2500);
        }

        // --- Séquence de Victoire (Hack réussi) ---
        async function declencherVictoire() {
            // Masquer l'interface de saisie
            interactiveArea.style.display = 'none';
            outputDiv.innerHTML = ''; // Nettoyer l'écran
            
            // Changement de couleur d'ambiance (vert -> bleu cyan pour marquer le déverrouillage)
            document.documentElement.style.setProperty('--neon-green', '#00FFFF');
            
            // Effet "Matrix" / Lignes de code qui défilent
            const codeLines = 25;
            for(let i=0; i<codeLines; i++) {
                const p = document.createElement('p');
                p.className = 'success-code';
                p.innerText = genererLigneHexa();
                outputDiv.appendChild(p);
                terminalContainer.scrollTop = terminalContainer.scrollHeight;
                await new Promise(resolve => setTimeout(resolve, 50));
            }

            // Message de victoire final
            await new Promise(resolve => setTimeout(resolve, 500));
            const victoryDiv = document.createElement('div');
            victoryDiv.className = 'victory-msg';
            victoryDiv.innerHTML = 'ACCÈS AUTORISÉ<br><br>VOTRE CLÉ DE DÉVERROUILLAGE EST :<br><strong>ROYAUME_OS</strong>';
            outputDiv.appendChild(victoryDiv);
            terminalContainer.scrollTop = terminalContainer.scrollHeight;
        }

        // --- Utilitaire : Générateur de fausses lignes de code ---
        function genererLigneHexa() {
            const chars = '0123456789ABCDEF!@#$%^&*()';
            let line = 'BYPASSING FIREWALL... [OK] 0x';
            for(let i=0; i<30; i++) {
                line += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return line;
        }

        // Lancement au chargement
        window.onload = initSequence;
    </script>
