<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Projet Éclipse — Genève</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=UnifrakturCook:wght@700&family=Cinzel:wght@500;700&family=Limelight&family=Major+Mono+Display&family=Playfair+Display:wght@700&family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style>
        /* =================== VARIABLES PAR ÈRE =================== */
        :root {
            --bg-color: #0a0a0a; --bg-deep: #050505;
            --accent: #c9a14a; --gold-soft: #e6c878;
            --text: #e6dcc8; --muted: #8a8377;
            --card-bg: rgba(20, 14, 8, 0.7);
            --border: rgba(201, 161, 74, 0.35);
            --success: #6fbf73; --danger: #b53d2a;
            --font-display: 'Cormorant Garamond', 'Cinzel', serif;
            --font-body: 'Cormorant Garamond', serif;
            --font-mono: 'Cormorant Garamond', serif;
            --radius: 2px;
            --glow: 0 0 30px rgba(201, 161, 74, 0.15);
        }
        body[data-era="baroque"] {
            --bg-color: #1a0f06; --bg-deep: #0d0703;
            --accent: #d4af5c; --text: #efe2c2; --muted: #8a7d5e;
            --card-bg: rgba(28, 18, 8, 0.85);
            --border: rgba(212, 175, 92, 0.4);
            --font-display: 'UnifrakturCook', 'Cinzel', serif;
            --glow: 0 0 40px rgba(212, 175, 92, 0.12);
        }
        body[data-era="industrial"] {
            --bg-color: #14181d; --bg-deep: #0a0d10;
            --accent: #c89243; --text: #e0d6c5; --muted: #8b8275;
            --card-bg: rgba(20, 24, 30, 0.85);
            --border: rgba(184, 115, 51, 0.45);
            --font-display: 'Limelight', 'Playfair Display', serif;
            --font-body: 'Playfair Display', serif;
            --font-mono: 'Major Mono Display', monospace;
            --radius: 0px;
            --glow: 0 0 30px rgba(184, 115, 51, 0.18);
        }
        body[data-era="cyber"] {
            --bg-color: #050810; --bg-deep: #02030a;
            --accent: #00f0ff; --text: #d0fff8; --muted: #5c6e7a;
            --card-bg: rgba(8, 14, 26, 0.75);
            --border: rgba(0, 240, 255, 0.45);
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius: 0px;
            --glow: 0 0 40px rgba(0, 240, 255, 0.35), 0 0 80px rgba(255, 43, 214, 0.15);
        }

        /* =================== BASE & BACKGROUND =================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            min-height: 100vh;
            background: var(--bg-deep); color: var(--text);
            font-family: var(--font-body); line-height: 1.55;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 1.2s ease, color 1.2s ease;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            pointer-events: none; z-index: 0;
            transition: opacity 1.2s ease;
            background-color: var(--bg-color);
        }
        body[data-era="baroque"]::before {
            background:
                radial-gradient(ellipse at 20% 10%, rgba(212, 175, 92, 0.10), transparent 50%),
                radial-gradient(ellipse at 80% 90%, rgba(120, 50, 30, 0.12), transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(40, 20, 10, 0.4), transparent 75%),
                var(--bg-color);
        }
        body[data-era="industrial"]::before {
            background:
                linear-gradient(135deg, rgba(184, 115, 51, 0.06) 0%, transparent 50%),
                repeating-linear-gradient(45deg, transparent 0 18px, rgba(255,255,255,0.012) 18px 19px),
                var(--bg-color);
        }
        body[data-era="cyber"]::before {
            background:
                radial-gradient(ellipse at 30% 20%, rgba(0, 240, 255, 0.10), transparent 55%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 43, 214, 0.10), transparent 55%),
                var(--bg-color);
        }

        /* =================== TEXTURES MATÉRIELLES =================== */
        #bg-texture {
            position: fixed; inset: 0; pointer-events: none; z-index: 1;
            opacity: 0; transition: opacity 1.2s ease, background 1.2s ease;
            mix-blend-mode: overlay; background-size: cover;
        }
        body[data-step="1"] #bg-texture {
            opacity: 0.35;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.03' numOctaves='4'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
        }
        body[data-step="2"] #bg-texture {
            opacity: 0.25;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='400'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.01 0.15' numOctaves='2'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
        }
        body[data-step="3"] #bg-texture {
            opacity: 0.15; mix-blend-mode: normal;
            background: repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0, rgba(255,255,255,0.03) 2px, transparent 2px, transparent 6px), repeating-linear-gradient(-45deg, rgba(0,0,0,0.15) 0, rgba(0,0,0,0.15) 2px, transparent 2px, transparent 6px);
        }
        body[data-step="4"] #bg-texture {
            opacity: 0.1; mix-blend-mode: normal;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='60' height='60'><rect x='2' y='2' width='26' height='26' rx='6' fill='none' stroke='white' stroke-width='2'/><rect x='32' y='32' width='26' height='26' rx='6' fill='none' stroke='white' stroke-width='2'/></svg>");
            background-size: 60px 60px;
        }
        body[data-step="5"] #bg-texture {
            opacity: 0.12; mix-blend-mode: normal;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><circle cx='100' cy='100' r='40' stroke='white' stroke-width='3' fill='none'/><circle cx='100' cy='100' r='80' stroke='white' stroke-width='1.5' fill='none'/></svg>");
            background-size: 150px 150px; background-position: center;
        }
        body[data-step="6"] #bg-texture {
            opacity: 0.25;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='1'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
        }
        body[data-step="7"] #bg-texture {
            opacity: 0.08; mix-blend-mode: normal;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='60' height='60'><path d='M30 10 C 45 10 50 25 50 30 C 50 35 45 50 30 50 C 15 50 10 35 10 30 C 10 25 15 10 30 10 Z' fill='none' stroke='white' stroke-width='1.5'/><path d='M30 10 L 30 50' stroke='white' stroke-width='1.5'/></svg>");
            background-size: 80px 80px;
        }
        body[data-step="8"] #bg-texture {
            opacity: 0.15; mix-blend-mode: normal;
            background: repeating-linear-gradient(0deg, rgba(255,255,255,0.06) 0, rgba(255,255,255,0.06) 20px, transparent 20px, transparent 60px);
            background-size: 6px 120px;
        }
        body[data-step="9"] #bg-texture {
            opacity: 0.25;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.006' numOctaves='3'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
        }

        #app {
            position: relative; z-index: 2;
            min-height: 100vh;
            display: flex; flex-direction: column;
            padding: 28px 22px 120px;
            max-width: 640px; margin: 0 auto;
        }

        /* =================== TYPO =================== */
        h1 {
            font-family: var(--font-display); color: var(--accent);
            margin-bottom: 18px; font-size: 2rem;
            letter-spacing: 0.02em; display: flex; align-items: center; justify-content: center; gap: 12px;
            user-select: none; -webkit-user-select: none;
            line-height: 1.1; text-shadow: var(--glow);
        }
        .title-icon { width: 36px; height: 36px; opacity: 0.85; display: inline-block; flex-shrink: 0; }
        .title-icon svg { width: 100%; height: 100%; stroke: var(--accent); }
        
        body[data-era="baroque"] h1 { font-size: 2.2rem; letter-spacing: 0.04em; }
        body[data-era="industrial"] h1 { font-size: 1.6rem; text-transform: uppercase; letter-spacing: 0.15em; }
        body[data-era="cyber"] h1 {
            font-size: 1.6rem; text-transform: uppercase; letter-spacing: 0.18em;
            text-shadow: 0 0 8px var(--accent), 0 0 22px rgba(0,240,255,0.5);
        }
        body[data-era="cyber"] h1.glitch { animation: glitch 6s infinite alternate; }
        @keyframes glitch {
            0%, 96% { transform: translate(0); }
            97% { transform: translate(-2px, 1px); text-shadow: -2px 0 var(--danger), 2px 0 var(--accent); }
            98% { transform: translate(2px, -1px); text-shadow: 2px 0 var(--danger), -2px 0 var(--accent); }
            99%, 100% { transform: translate(0); text-shadow: 0 0 8px var(--accent), 0 0 22px rgba(0,240,255,0.5); }
        }
        h2, h3 { font-family: var(--font-display); color: var(--accent); margin-bottom: 12px; }
        p { margin-bottom: 22px; font-size: 1.12rem; color: var(--text); }
        body[data-era="baroque"] p { font-style: italic; font-size: 1.18rem; }
        body[data-era="cyber"] p  { font-family: var(--font-body); font-size: 1.02rem; }
        .label {
            font-family: var(--font-mono); font-size: 0.72rem;
            letter-spacing: 0.25em; text-transform: uppercase;
            color: var(--muted); margin-bottom: 8px;
        }

        /* =================== ORNEMENTS =================== */
        .ornament {
            text-align: center; margin: 12px 0 22px;
            color: var(--accent); font-family: var(--font-display);
            font-size: 1.4rem; opacity: 0.85; letter-spacing: 0.4em;
        }
        body[data-era="baroque"] .ornament::before  { content: '❦ ✦ ❦'; }
        body[data-era="industrial"] .ornament::before { content: '▮ ▬ ▮ ▬ ▮'; letter-spacing: 0.5em; }
        body[data-era="cyber"] .ornament::before      { content: '[ // ▮ ▮ ▮ // ]'; font-family: var(--font-mono); letter-spacing: 0.15em; font-size: 1rem; }

        /* =================== TOPBAR & PROGRESS =================== */
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 14px; opacity: 0.85; gap: 10px;
        }
        .topbar .meta {
            font-family: var(--font-mono); font-size: 0.72rem;
            letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted);
        }
        .btn-pause {
            width: auto; padding: 6px 10px; font-size: 0.65rem;
            background: transparent; color: var(--muted);
            border: 1px solid var(--border); letter-spacing: 0.15em;
        }
        .btn-pause:hover:not(:disabled) { color: var(--accent); border-color: var(--accent); }

        .progress { display: flex; gap: 6px; margin: 8px 0 26px; }
        .progress .dot {
            flex: 1; height: 4px; background: rgba(255,255,255,0.08);
            border-radius: 2px; overflow: hidden; position: relative;
        }
        .progress .dot.done { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        .progress .dot.current::after {
            content: ''; position: absolute; inset: 0;
            background: var(--accent); opacity: 0.6;
            animation: pulse 1.4s ease-in-out infinite;
        }
        @keyframes pulse { 50% { opacity: 0.2; } }

        /* =================== CARTES & WATERMARK =================== */
        .card-container {
            perspective: 1000px;
            transform-style: preserve-3d;
            transform: rotateY(var(--tilt-y, 0deg)) rotateX(var(--tilt-x, 0deg));
            transition: transform 0.15s ease-out;
            will-change: transform;
            margin-bottom: 18px;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px;
            position: relative;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            overflow: hidden;
        }
        body[data-era="baroque"] .card {
            border: 1px double var(--border);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.4), 0 0 0 4px rgba(0,0,0,0.4), 0 0 0 5px var(--border);
        }
        body[data-era="industrial"] .card {
            border-left: 4px solid var(--accent);
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
        }
        body[data-era="cyber"] .card {
            border: 1px solid var(--border);
            clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
            box-shadow: var(--glow);
        }
        
        .location-watermark {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 160px; height: 160px;
            opacity: 0.04; pointer-events: none; z-index: 0;
        }
        .location-watermark svg { width: 100%; height: 100%; stroke: var(--accent); }
        .card > *:not(.location-watermark) { position: relative; z-index: 1; }

        .shake { animation: shake 0.4s ease; }
        @keyframes shake {
            10%,90% { transform: translateX(-2px); }
            20%,80% { transform: translateX(4px); }
            30%,50%,70% { transform: translateX(-8px); }
            40%,60% { transform: translateX(8px); }
        }

        /* =================== INPUTS =================== */
        input[type="text"], textarea {
            width: 100%; padding: 16px 18px;
            background: rgba(0,0,0,0.45);
            border: 1px solid var(--border); color: var(--text);
            font-family: var(--font-mono); font-size: 1.15rem;
            border-radius: var(--radius); outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            text-align: center;
        }
        textarea { resize: vertical; min-height: 80px; text-align: left; font-size: 1rem; }
        input[type="text"]:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent), var(--glow);
        }
        input::placeholder, textarea::placeholder { color: var(--muted); opacity: 0.65; }

        /* =================== BOUTONS =================== */
        button {
            width: 100%; background: var(--accent); color: var(--bg-deep);
            border: none; padding: 18px 22px;
            font-family: var(--font-display); font-size: 1.05rem;
            font-weight: 700; letter-spacing: 0.15em;
            text-transform: uppercase;
            border-radius: var(--radius); cursor: pointer;
            transition: transform 0.15s, box-shadow 0.25s, background 0.25s, opacity 0.2s;
            position: relative;
        }
        button:hover:not(:disabled) { transform: translateY(-1px); box-shadow: var(--glow); }
        button:active:not(:disabled) { transform: translateY(1px); }
        button:disabled { background: rgba(255,255,255,0.07); color: var(--muted); cursor: not-allowed; }

        body[data-era="cyber"] button:not(:disabled):not(.btn-dev) {
            background: transparent; color: var(--accent);
            border: 1px solid var(--accent);
            box-shadow: 0 0 12px rgba(0,240,255,0.25);
            text-shadow: 0 0 6px var(--accent);
        }
        body[data-era="cyber"] button:hover:not(:disabled):not(.btn-dev) {
            background: rgba(0,240,255,0.08);
            box-shadow: 0 0 20px var(--accent), inset 0 0 16px rgba(0,240,255,0.15);
        }
        .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
        .btn-dev {
            background: #ffd54a; color: #1a1a1a;
            margin-top: 14px; border: 1px dashed #000; font-size: 0.9rem;
        }
        .btn-danger {
            background: transparent; border: 1px solid var(--danger);
            color: #ff7a66; margin-top: 22px;
        }
        .btn-success { background: var(--success); color: #061; }

        /* =================== ACTION FIXE =================== */
        .bottom-action {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg-deep) 65%, transparent);
            z-index: 30;
            display: flex; flex-direction: column; gap: 10px;
            max-width: 640px; margin: 0 auto;
        }

        /* =================== GPS TRACKER =================== */
        .tracker {
            text-align: center; padding: 36px 18px;
            border: 1px dashed var(--border); background: var(--card-bg);
            border-radius: var(--radius); margin-bottom: 0;
            position: relative; overflow: hidden;
        }
        body[data-era="cyber"] .tracker { border-style: solid; }
        .tracker .label-dist {
            font-family: var(--font-mono); font-size: 0.75rem;
            letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted);
        }
        .tracker .distance {
            font-family: var(--font-mono); font-size: 3.6rem;
            color: var(--accent); font-weight: 700;
            margin: 14px 0; text-shadow: var(--glow);
        }
        body[data-era="baroque"] .tracker .distance { font-family: var(--font-display); }
        .tracker .compass-ring {
            margin: 14px auto; width: 96px; height: 96px;
            border-radius: 50%; border: 1px solid var(--border);
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .compass-svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
        .tracker .compass-ring .dot-inner {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--accent); box-shadow: 0 0 12px var(--accent); z-index: 2;
        }
        .accuracy { font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); letter-spacing: 0.15em; margin-top: 6px; }

        /* =================== HINTS =================== */
        .hint-card {
            background: rgba(0,0,0,0.35);
            border-left: 3px solid var(--accent);
            padding: 14px 16px;
            border-radius: var(--radius);
            margin-bottom: 12px;
            animation: hintReveal 0.6s ease forwards;
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        @keyframes hintReveal {
            from { opacity: 0; transform: translateX(-12px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        .hint-card.exit { opacity: 0 !important; transform: translateX(-12px) !important; }
        .hint-card .hint-label {
            font-family: var(--font-mono); font-size: 0.7rem;
            letter-spacing: 0.2em; text-transform: uppercase;
            color: var(--accent); margin-bottom: 6px;
        }
        .hint-card.custom {
            border-left-color: var(--gold-soft);
            background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(212,175,92,0.08));
        }

        /* =================== GM =================== */
        .gm-card { margin-bottom: 14px; padding: 16px 18px; }
        .gm-card label, .gm-card .lbl {
            display: block; font-family: var(--font-mono);
            color: var(--muted); font-size: 0.72rem;
            letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 6px;
        }
        .gm-card .data { color: var(--text); font-size: 1rem; }
        .gm-card .answer {
            color: var(--accent); font-family: var(--font-mono);
            font-weight: 700; font-size: 1.3rem; letter-spacing: 0.05em;
        }
        .gm-status-badge {
            display: inline-block; margin-top: 8px;
            padding: 4px 10px; font-family: var(--font-mono);
            font-size: 0.7rem; letter-spacing: 0.15em;
            text-transform: uppercase; color: var(--bg-deep);
            background: var(--accent); border-radius: 100px;
        }
        .gm-hint-row {
            display: flex; align-items: stretch; gap: 10px;
            margin-bottom: 10px; padding: 12px;
            background: rgba(0,0,0,0.3); border-radius: 4px;
            border: 1px solid var(--border);
        }
        .gm-hint-row .hint-content { flex: 1; font-size: 0.92rem; line-height: 1.4; color: var(--text); }
        .gm-hint-row .hint-content .lvl {
            font-family: var(--font-mono); font-size: 0.65rem;
            letter-spacing: 0.2em; color: var(--muted);
            text-transform: uppercase; margin-bottom: 4px;
        }
        .gm-hint-row button { width: auto; padding: 10px 16px; font-size: 0.78rem; letter-spacing: 0.1em; }
        .gm-hint-row.released { border-color: var(--success); background: rgba(111, 191, 115, 0.08); }
        .gm-hint-row.released .lvl { color: var(--success); }
        .btn-gm-action {
            background: transparent; color: var(--text);
            border: 1px solid var(--border); margin-bottom: 10px;
            font-size: 0.85rem;
        }
        .btn-gm-action.highlight { border-color: var(--accent); color: var(--accent); box-shadow: var(--glow); }

        .team-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 12px; border: 1px solid var(--border);
            background: rgba(0,0,0,0.25); border-radius: var(--radius);
            margin-bottom: 8px; cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .team-row:hover { border-color: var(--accent); background: rgba(184, 115, 51, 0.1); }
        .team-row.active { border-color: var(--accent); background: rgba(184, 115, 51, 0.15); }
        .team-row .team-name { font-family: var(--font-mono); font-size: 0.95rem; color: var(--text); }
        .team-row .team-state { font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; }

        /* =================== OVERLAYS =================== */
        .overlay {
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-deep);

        function eraOf(stepIndex) {
            if (stepIndex < 3) return 'baroque';

        }
        const ERA_LABELS = {

        const ERA_TRANSITION_MODE = {

        // ============================== ÉTAT GLOBAL ==============================
        const appContainer = document.getElementById('app');

        // ============================== BOUSSOLE & GPS ==============================
        let currentDeviceHeading = 0;
        let currentTargetBearing = 0;
        let currentDistance = 9999;

        function getDistanceInMeters(lat1, lon1, lat2, lon2) {
            const R = 6371e3, rad = Math.PI / 180;
            const a = Math.sin((lat2 - lat1)*rad / 2) ** 2 +
                      Math.cos(lat1*rad) * Math.cos(lat2*rad) * Math.sin((lon2 - lon1)*rad / 2) ** 2;
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }
        function getBearing(lat1, lon1, lat2, lon2) {
            const rad = Math.PI / 180;
            const dLon = (lon2 - lon1) * rad;
            lat1 *= rad; lat2 *= rad;
            const y = Math.sin(dLon) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
            return (Math.atan2(y, x) * (180 / Math.PI) + 360) % 360;
        }
        function updateCompassUI() {
            const svgGroup = document.getElementById('compass-group');
            const arc = document.getElementById('compass-arc');
            if (!svgGroup || !arc) return;
            const fillRatio = 0.15 + ((1.0 - Math.min(1, Math.max(0, (currentDistance - 20) / 130))) * 0.85);
            arc.style.strokeDashoffset = 238.76 * (1 - fillRatio);
            let raw = currentTargetBearing - currentDeviceHeading;
            let delta = raw - (accumulatedCompassRotation % 360);
            delta = ((delta + 180) % 360 + 360) % 360 - 180;
            accumulatedCompassRotation += delta;
            svgGroup.style.transform = `rotate(${accumulatedCompassRotation - (180 * fillRatio)}deg)`;
        }
        function handleOrientation(e) {
            let heading = null;
            if (e.webkitCompassHeading !== undefined) heading = e.webkitCompassHeading;
            else if (e.absolute === true || e.alpha !== null) heading = 360 - e.alpha;
            if (heading !== null) {
                currentDeviceHeading = heading;
                updateCompassUI();
            }
        }
        function attachGyroOnce() {
            if (gyroAttached || isGMSession) return; // Désactivé pour le GM
            window.addEventListener('deviceorientationabsolute', handleOrientation);
            window.addEventListener('deviceorientation', handleOrientation);

        // ============================== AUDIO ==============================
        let audioCtx = null;
        function ensureAudio() {
            if (!audioCtx) {
                try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
                catch (e) { audioCtx = null; }
            }
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }
        function playTone(freq, dur = 0.18, type = 'sine', vol = 0.18, when = 0) {
            const ctx = ensureAudio(); if (!ctx) return;
            const t0 = ctx.currentTime + when;
            const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, t0);
            gain.gain.setValueAtTime(0, t0);
            gain.gain.linearRampToValueAtTime(vol, t0 + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
            osc.connect(gain).connect(ctx.destination);
            osc.start(t0); osc.stop(t0 + dur + 0.05);
        }
        function sfx(name) {
            const era = eraOf(currentStepIndex);
            if (name === 'success') {

                    playTone(659.25, 0.25, 'triangle', 0.14, 0.12);
                    playTone(783.99, 0.45, 'triangle', 0.14, 0.24);
                } else if (era === 'industrial') {
                    playTone(440, 0.18, 'sawtooth', 0.10, 0);
                    playTone(554.37, 0.18, 'sawtooth', 0.10, 0.10);
                    playTone(659.25, 0.35, 'square', 0.10, 0.20);
                } else {
                    playTone(880, 0.10, 'square', 0.10, 0);
                    playTone(1318.51, 0.10, 'square', 0.10, 0.08);
                    playTone(1760, 0.30, 'sine', 0.12, 0.16);
                    playTone(2637.02, 0.40, 'sine', 0.06, 0.20);
                }
            } else if (name === 'error') {
                playTone(180, 0.18, 'sawtooth', 0.18, 0);
                playTone(120, 0.30, 'sawtooth', 0.16, 0.08);
                if (navigator.vibrate) navigator.vibrate([60, 40, 60]);
            } else if (name === 'hint') {
                playTone(880, 0.08, 'sine', 0.10, 0);
                playTone(1108.73, 0.12, 'sine', 0.10, 0.07);
                playTone(1318.51, 0.18, 'sine', 0.10, 0.14);
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

        // ============================== ÈRE / TRANSITION ==============================
        function applyEra(era, opts = {}) {
            const animate = opts.animate !== false;
            const previous = document.body.getAttribute('data-era');
            if (previous === era) return;
            if (previous && animate) {
                const overlay = document.getElementById('eraTransition');

        // ============================== PARTICULES ==============================
        const canvas = document.getElementById('particleCanvas');
        const ctx2d = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        function burstParticles(era, opts = {}) {
            const N = opts.count || 90;
            const cy = opts.cy || canvas.height * 0.42;
            const cx = opts.cx || canvas.width / 2;
            const palette = {
                baroque: ['#d4af5c', '#f0d68a', '#b53d2a', '#efe2c2'],
                industrial: ['#c89243', '#e8b75a', '#b87333', '#e0d6c5'],
                cyber: ['#00f0ff', '#ff2bd6', '#7afff0', '#ffffff']
            }[era] || ['#fff'];
            const particles = [];
            for (let i = 0; i < N; i++) {
                const a = Math.random() * Math.PI * 2;
                const v = 3 + Math.random() * 7;
                particles.push({
                    x: cx, y: cy, vx: Math.cos(a) * v, vy: Math.sin(a) * v - 2,
                    g: 0.18, life: 0, max: 70 + Math.random() * 50,
                    color: palette[i % palette.length],
                    size: 2 + Math.random() * 4,
                    rot: Math.random() * Math.PI,
                    vrot: (Math.random() - 0.5) * 0.3,
                    shape: era === 'baroque' ? 'petal' : era === 'industrial' ? 'gear' : 'square'
                });
            }
            function frame() {
                ctx2d.clearRect(0, 0, canvas.width, canvas.height);
                let alive = 0;
                for (const p of particles) {
                    if (p.life >= p.max) continue;
                    alive++; p.life++;
                    p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vrot;
                    ctx2d.save();
                    ctx2d.translate(p.x, p.y);
                    ctx2d.rotate(p.rot);
                    ctx2d.fillStyle = p.color;
                    ctx2d.globalAlpha = 1 - (p.life / p.max);
                    if (p.shape === 'square') {
                        ctx2d.fillRect(-p.size, -p.size, p.size * 2, p.size * 2);
                    } else if (p.shape === 'petal') {
                        ctx2d.beginPath();
                        ctx2d.ellipse(0, 0, p.size, p.size * 2, 0, 0, Math.PI * 2);
                        ctx2d.fill();
                    } else {
                        ctx2d.beginPath();
                        for (let k = 0; k < 6; k++) {
                            const r = k % 2 ? p.size : p.size * 1.7;
                            const an = (k / 6) * Math.PI * 2;
                            ctx2d.lineTo(Math.cos(an) * r, Math.sin(an) * r);
                        }
                        ctx2d.closePath(); ctx2d.fill();
                    }
                    ctx2d.restore();
                }
                if (alive > 0) requestAnimationFrame(frame);
                else ctx2d.clearRect(0, 0, canvas.width, canvas.height);
            }
            frame();
        }

        // ============================== TILT 3D AVEC rAF ==============================

        function scheduleTilt() {
            if (tiltScheduled || isGMSession) return;
            tiltScheduled = true;
            requestAnimationFrame(() => {
                tiltScheduled = false;
                document.querySelectorAll('.card-container').forEach(c => {
                    c.style.setProperty('--tilt-x', `${lastTiltX}deg`);
                    c.style.setProperty('--tilt-y', `${lastTiltY}deg`);
                });
            });
        }
        window.addEventListener('mousemove', (e) => {
            if (isPaused || isGMSession) return;
            lastTiltY = (window.innerWidth / 2 - e.pageX) / -45;
            lastTiltX = (window.innerHeight / 2 - e.pageY) / 45;
            scheduleTilt();
        });
        window.addEventListener('deviceorientation', (e) => {
            if (isPaused || isGMSession) return;
            if (e.gamma == null || e.beta == null) return;
            lastTiltY = Math.min(Math.max(e.gamma / 4, -8), 8);
            lastTiltX = Math.min(Math.max((e.beta - 45) / 4, -8), 8);
            scheduleTilt();
        });

            currentView = 'transition';

            localStorage.setItem('escapeLocalView', currentView);

        function renderHints(step, releasedCount, customHint) {
            if (releasedCount <= 0 && !customHint) return '';
            let html = '<div class="hints-zone" data-testid="hints-zone"><div class="label">Indices reçus</div>';
            if (customHint) {
                html += `

                        <div class="hint-label">Message du Maître</div>
                        <div>${escapeHtml(customHint)}</div>

            }
            for (let i = 0; i < releasedCount && i < (step.hints?.length || 0); i++) {
                html += `
                    <div class="hint-card" data-testid="hint-${i + 1}">
                        <div class="hint-label">Indice ${i + 1}</div>
                        <div>${escapeHtml(step.hints[i])}</div>
                    </div>`;
            }
            return html + '</div>';
        }
        function escapeHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function startGPS(targetLat, targetLon) {
            const display = document.getElementById('dist-display');
            const accEl = document.getElementById('acc-display');
            const btn = document.getElementById('btn-arrive');
            const fallbackZone = document.getElementById('gps-fallback-zone');
            let arrived = false;
            if (!navigator.geolocation) { display.innerText = 'GPS indisponible'; return; }

            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const rawLat = pos.coords.latitude, rawLon = pos.coords.longitude, accuracy = pos.coords.accuracy;
                    if (smoothedLat === null) { smoothedLat = rawLat; smoothedLon = rawLon; }
                    else if (accuracy < 60) {
                        smoothedLat = (ALPHA_SMOOTHING * rawLat) + ((1 - ALPHA_SMOOTHING) * smoothedLat);
                        smoothedLon = (ALPHA_SMOOTHING * rawLon) + ((1 - ALPHA_SMOOTHING) * smoothedLon);
                    }
                    currentDistance = Math.round(getDistanceInMeters(smoothedLat, smoothedLon, targetLat, targetLon));
                    display.innerText = `${currentDistance} m`;
                    const validationRadius = Math.max(20, Math.min(45, accuracy * 0.7));
                    
                    if (accuracy > 30) accEl.innerHTML = `<span style="color:var(--danger)">Précision faible (±${Math.round(accuracy)}m)</span>`;
                    else accEl.innerText = `Précision ±${Math.round(accuracy)} m`;

                    currentTargetBearing = getBearing(smoothedLat, smoothedLon, targetLat, targetLon);
                    updateCompassUI();

                    const elapsed = (Date.now() - gpsSearchStartTime) / 1000;
                    if (elapsed > 60 && currentDistance < 50 && fallbackZone && !fallbackZone.innerHTML) {
                        fallbackZone.innerHTML = `
                            <div style="font-size:0.72rem; color:var(--muted); margin-bottom:8px; letter-spacing:0.1em;">La précision GPS varie en ville. Si tu vois le lieu, valide manuellement.</div>
                            <button class="btn-secondary" style="font-size:0.78rem; padding:12px;">Valider manuellement</button>`;
                        fallbackZone.querySelector('button').onclick = () => {
                            sfx('click');
                            currentView = 'enigma';
                            localStorage.setItem('escapeLocalView', currentView);
                            writeSession({ view: currentView });
                            renderPlayerUI();
                        };
                    }

                    if (currentDistance <= validationRadius) {
                        if (!arrived) { arrived = true; sfx('arrive'); toast("Cible atteinte", "ok"); }
                        btn.disabled = false; btn.innerText = "Je suis arrivé";
                        btn.onclick = () => {
                            sfx('click');
                            currentView = 'enigma';
                            localStorage.setItem('escapeLocalView', currentView);
                            writeSession({ view: currentView });
                            renderPlayerUI();
                        };
                    } else {
                        arrived = false; btn.disabled = true;
                        btn.innerText = currentDistance < 80 ? "Approche encore…" : "Hors zone";
                        btn.onclick = null;
                    }
                },
                (err) => {
                    display.innerText = "Erreur GPS";
                    if (err.code === 1) accEl.innerHTML = "Accès refusé.<br><span style='font-size:0.65rem; color:var(--danger); display:block; margin-top:4px;'>Sur iPhone : Réglages > Safari > Position > Autoriser, puis rechargez.</span>";
                    else if (err.code === 2) accEl.innerText = "Position introuvable. Activez le Wi-Fi.";
                    else if (err.code === 3) accEl.innerText = "Délai dépassé. Signal GPS trop faible.";
                    else accEl.innerText = err.message || "Erreur inconnue";
                },
                { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
            );
        }

        function fmtDuration(ms) {
            if (!ms || ms < 0) return '--';
            const s = Math.floor(ms / 1000);
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            const pad = (n) => String(n).padStart(2, '0');
            return h > 0 ? `${h}h${pad(m)}` : `${pad(m)}:${pad(sec)}`;
        }

        // ============================== GÉNÉRATION DE LA CARTE POSTALE (CANVAS HD SUR CARTE UPLOADÉE) ==============================
        function generatePostcard(durationMs, callback) {
            const W = 1000;
            const H = 1400; // Format Portrait, comme la carte Midnight Blue SVG
            const cnv = document.createElement('canvas');
            cnv.width = W; cnv.height = H;
            const ctx = cnv.getContext('2d');

            const img = new Image();
            img.crossOrigin = "Anonymous";
            // /!\ IMPORTANT : Place ton fichier JPG allégé
            // dans le même dossier sur ton repo privé GitHub pour qu'il se charge ici !
            img.src = "./gen_ve_midnight_blue_20260602_154443.jpg"; 

            img.onload = () => draw(img);
            img.onerror = () => {
                console.warn("Fichier image introuvable. Fallback abstrait.");
                draw(null); 
            };

            function draw(bgImg) {
                if (bgImg) {
                    // On dessine ta map en fond complet (cover math)
                    const scale = Math.max(W / bgImg.width, H / bgImg.height);
                    const w = bgImg.width * scale;
                    const h = bgImg.height * scale;
                    const x = (W - w) / 2;
                    const y = (H - h) / 2;
                    ctx.drawImage(bgImg, x, y, w, h);
                } else {
                    // Fallback couleur "Midnight Blue" si le fichier n'est pas chargé
                    ctx.fillStyle = '#0a1128';
                    ctx.fillRect(0, 0, W, H);
                }

                // --- TRACÉ DU PARCOURS ---
                const lats = gameSteps.map(s => s.targetLat);
                const lons = gameSteps.map(s => s.targetLon);
                const minLat = Math.min(...lats), maxLat = Math.max(...lats);
                const minLon = Math.min(...lons), maxLon = Math.max(...lons);
                
                // Marge pour centrer le parcours sur la map
                const padX = 150;
                const padTop = 250;
                const padBottom = 400;

                const proj = (lat, lon) => {
                    const x = padX + ((lon - minLon) / (maxLon - minLon)) * (W - 2 * padX);
                    // Latitude inversée (Nord en haut)
                    const y = padTop + (1 - (lat - minLat) / (maxLat - minLat)) * (H - padTop - padBottom);
                    return [x, y];
                };

                const points = gameSteps.map(s => proj(s.targetLat, s.targetLon));

                // Tracer la ligne dorée
                ctx.beginPath();
                points.forEach((p, i) => {
                    if (i === 0) ctx.moveTo(p[0], p[1]);
                    else ctx.lineTo(p[0], p[1]);
                });
                ctx.strokeStyle = '#c9a14a';
                ctx.lineWidth = 4;
                ctx.setLineDash([12, 8]);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                // Glow doré sur la ligne
                ctx.shadowColor = '#c9a14a';
                ctx.shadowBlur = 10;
                ctx.stroke();
                
                // Reset shadow et dash
                ctx.shadowBlur = 0;
                ctx.setLineDash([]);

                // Tracer les points d'étape
                points.forEach((p, i) => {
                    ctx.fillStyle = '#0a1128';
                    ctx.beginPath();
                    ctx.arc(p[0], p[1], 16, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.strokeStyle = '#c9a14a';
                    ctx.lineWidth = 3;
                    ctx.stroke();

                    ctx.fillStyle = '#c9a14a';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.font = 'bold 16px "JetBrains Mono", monospace';
                    ctx.fillText(gameSteps[i].id, p[0], p[1]);
                });

                // --- TEXTES DU BAS (STYLE MINUIT & OR) ---
                // Fond légèrement assombri en bas pour lisibilité
                const grad = ctx.createLinearGradient(0, H - 350, 0, H);
                grad.addColorStop(0, 'rgba(10, 17, 40, 0)');
                grad.addColorStop(1, 'rgba(10, 17, 40, 0.95)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, H - 350, W, 350);

                ctx.fillStyle = '#c9a14a';
                ctx.textAlign = 'left';
                
                ctx.font = 'bold 54px "Cinzel", serif';
                ctx.fillText("PROJET ÉCLIPSE", 80, H - 180);

                ctx.font = '32px "Cormorant Garamond", serif';
                ctx.fillStyle = '#e6dcc8';
                ctx.fillText("Rapport de Mission de l'Ordre des Veilleurs", 80, H - 120);

                ctx.font = '24px "JetBrains Mono", monospace';
                ctx.fillStyle = '#8a8377';
                ctx.fillText(`ÉQUIPE : ${TEAM_ID}`, 80, H - 60);
                ctx.fillText(`TEMPS  : ${fmtDuration(durationMs)}`, 450, H - 60);

                // --- SCEAU ROUGE FINAL ---
                ctx.strokeStyle = '#b53d2a';
                ctx.lineWidth = 5;
                ctx.beginPath(); ctx.arc(W - 140, H - 140, 75, 0, Math.PI * 2); ctx.stroke();
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(W - 140, H - 140, 62, 0, Math.PI * 2); ctx.stroke();
                
                ctx.fillStyle = '#b53d2a';
                ctx.textAlign = 'center';
                ctx.font = 'bold 28px "Cinzel", serif';
                ctx.fillText("PACTE", W - 140, H - 145);
                ctx.fillText("SCELLÉ", W - 140, H - 105);
                
                // Trait central du sceau
                ctx.beginPath(); ctx.moveTo(W - 190, H - 125); ctx.lineTo(W - 90, H - 125);
                ctx.lineWidth = 1.5; ctx.stroke();

                callback(cnv.toDataURL('image/png', 0.9));
            }
        }

                        toast(`Indice ${idx + 1} envoyé au joueur`, 'ok');
                    } else if (act === 'lock-hint') {
                        writeSession({ hintsReleased: idx });
                        toast(`Indice retiré`, '');
                    } else if (act === 'send-custom') {
                        const txt = document.getElementById('custom-hint-input').value.trim();
                        writeSession({ customHint: txt });
                        toast(txt ? 'Message envoyé' : 'Message effacé', 'ok');
                    } else if (act === 'clear-custom') {
                        document.getElementById('custom-hint-input').value = '';
                        writeSession({ customHint: "" });
                        toast('Message effacé', '');
                    }
                });
            });

            const bForceGps = document.getElementById('btn-force-gps');
            if (bForceGps) bForceGps.onclick = () => { if (confirm("Envoyer le joueur en mode GPS ?")) writeSession({ view: 'gps' }); };
            const bForceEnig = document.getElementById('btn-force-enigma');
            if (bForceEnig) bForceEnig.onclick = () => { if (confirm("Bypasser le GPS et basculer sur l'énigme ?")) writeSession({ view: 'enigma' }); };
            const bForceNext = document.getElementById('btn-force-next');
            if (bForceNext) bForceNext.onclick = () => {
                if (confirm("Valider l'énigme et passer à l'étape suivante ?")) {
                    writeSession({ step: fbStepIndex + 1, view: 'transition', hintsReleased: 0, customHint: "" });
                }
            };
            const bReset = document.getElementById('btn-reset');
            if (bReset) bReset.onclick = () => {
                if (confirm("DANGER : Réinitialiser toute la partie ?")) {
                    localStorage.removeItem('escapeStartTs');
                    localStorage.removeItem('escapeAttempts');
                    localStorage.removeItem('escapePausedDuration');
                    attemptsByStep = {}; pausedDuration = 0;
                    writeSession({
                        step: 0, view: 'transition', hintsReleased: 0, customHint: "",
                        attemptsByStep: null
                    });
                    toast("Partie réinitialisée", 'ok');
                }
            };
        }

        // ============================== BOOT ==============================
        async function runBootSequence() {
            const boot = document.getElementById('bootScreen');
            const skipBtn = document.getElementById('bootSkip');
            if (sessionStorage.getItem('hasBooted') || currentStepIndex > 0 || isGMSession) {
                boot.style.display = 'none'; return;
            }
            const output = document.getElementById('bootOutput');
            const lines = [
                "> INITIALIZING ECLIPSE PROTOCOL...",
                "> BYPASSING GENEVA FIREWALL...",
                "> INJECTING PAYLOAD TO MAINFRAME...",
                "> SYNCING GPS SATELLITES...",
                "> DECRYPTING ERA_01 : BAROQUE",
                "> ACCESS GRANTED."
            ];
            let skipped = false;
            const skipBoot = () => {
                if (skipped) return;
                skipped = true;
                boot.style.opacity = '0';
                sessionStorage.setItem('hasBooted', 'true');
                setTimeout(() => boot.style.display = 'none', 400);
            };
            skipBtn.onclick = skipBoot;
            for (let line of lines) {
                if (skipped) break;
                const el = document.createElement('div');
                el.className = 'boot-line';
                el.textContent = line;
                output.appendChild(el);
                try { playTone(800 + Math.random()*1000, 0.05, 'square', 0.05); } catch(e){}
                await new Promise(r => setTimeout(r, 280 + Math.random() * 380));
            }
            if (!skipped) {
                await new Promise(r => setTimeout(r, 500));
                skipBoot();
            }
        }

        // ============================== OFFLINE ==============================
        function updateOnlineUI() {
            const banner = document.getElementById('offlineBanner');
            const offline = !isOnline || !firebaseConnected;
            banner.classList.toggle('show', offline);
        }
        window.addEventListener('online', () => { isOnline = true; updateOnlineUI(); toast("De retour en ligne", "ok"); });
        window.addEventListener('offline', () => { isOnline = false; updateOnlineUI(); toast("Mode hors-ligne", "error"); });

        // ============================== INIT ==============================
        function init() {
            runBootSequence();

            if (!startTimestamp && !isGMSession) {
                startTimestamp = Date.now();
                localStorage.setItem('escapeStartTs', startTimestamp);
            }

            if (isGMSession) {
                let gmAuth = sessionStorage.getItem('gmAuth');
                if (gmAuth !== '1') {
                    const attempt = prompt("Accès restreint. Entrez la clé d'identification :");
                    if (attempt && verifyCode(attempt, ADMIN_TOKEN)) {
                        sessionStorage.setItem('gmAuth', '1');
                    } else {
                        alert("Accès refusé.");
                        window.location.href = "?"; return;
                    }
                }
            }

            onValue(ref(db, '.info/connected'), (snap) => {
                firebaseConnected = !!snap.val();
                updateOnlineUI();
            });

            onValue(ref(db, `session/${TEAM_ID}`), (snapshot) => {
                const data = snapshot.val() || {};
                const fbStep = typeof data.step === 'number' ? data.step : 0;
                const fbView = data.view || 'transition';
                const fbHints = typeof data.hintsReleased === 'number' ? data.hintsReleased : 0;
                const fbCustom = data.customHint || "";
                const fbAttempts = data.attemptsByStep || {};
                
                Object.keys(fbAttempts).forEach(k => {
                    if ((fbAttempts[k] || 0) > (attemptsByStep[k] || 0)) attemptsByStep[k] = fbAttempts[k];
                });

                if (isGMSession) {
                    lastFbHintsReleased = fbHints;
                    lastFbCustomHint = fbCustom;
                    renderGMUI(fbStep, fbView, fbHints, fbCustom);
                } else {
                    const viewRank = { 'transition': 0, 'gps': 1, 'enigma': 2, 'end': 3 };
                    let needRender = false;
                    if (fbStep !== currentStepIndex) {
                        if (fbStep === 0 && fbView === 'transition' && (currentStepIndex > 0 || currentView !== 'transition')) {
                            localStorage.removeItem('escapeStartTs');
                            localStorage.removeItem('escapeAttempts');
                            localStorage.removeItem('escapePausedDuration');
                            attemptsByStep = {}; pausedDuration = 0;
                            startTimestamp = Date.now();
                            localStorage.setItem('escapeStartTs', startTimestamp);
                        }
                        currentStepIndex = fbStep;
                        currentView = fbView;
                        needRender = true;
                    } else if ((viewRank[fbView] ?? 0) !== (viewRank[currentView] ?? 0)) {
                        currentView = fbView;
                        needRender = true;
                    } else if (fbHints !== lastFbHintsReleased || fbCustom !== lastFbCustomHint) {
                        if (fbHints > lastFbHintsReleased || (fbCustom && fbCustom !== lastFbCustomHint)) {
                            flashHintReceived();
                        }
                        if (!fbCustom && lastFbCustomHint) {
                            const c = document.querySelector('[data-testid="hint-custom"]');
                            if (c) {
                                c.classList.add('exit');
                                setTimeout(() => { needRender = true; renderPlayerUI({ hintsReleased: fbHints, customHint: fbCustom }); }, 400);
                                lastFbHintsReleased = fbHints;
                                lastFbCustomHint = fbCustom;
                                return;
                            }
                        }
                        needRender = true;
                    }

                    lastFbHintsReleased = fbHints;
                    lastFbCustomHint = fbCustom;

                    if (needRender) {
                        localStorage.setItem('escapeLocalStep', currentStepIndex);
                        localStorage.setItem('escapeLocalView', currentView);
                        if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
                        if (currentStepIndex >= gameSteps.length) renderEndScreen();
                        else renderPlayerUI({ hintsReleased: fbHints, customHint: fbCustom });
                    }
                }
            });

            if (!isGMSession) {
                writeSession({ step: currentStepIndex, view: currentView });
                renderPlayerUI({ hintsReleased: 0, customHint: "" });
            }

            const unlockAudio = () => {
                ensureAudio();
                document.removeEventListener('touchstart', unlockAudio);
                document.removeEventListener('click', unlockAudio);
            };
            document.addEventListener('touchstart', unlockAudio, { once: true });
            document.addEventListener('click', unlockAudio, { once: true });
        }

        init();
    </script>
</body>
</html>
